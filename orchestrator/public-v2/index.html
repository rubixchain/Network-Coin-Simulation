<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rubix Network Coin Platform — Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js"></script>
<style>
  :root{
    --bg:#f4f6ec; --panel:#ffffff; --panel2:#eef1e3; --border:#d6dbc6;
    --text:#033500; --muted:#5d6b50; --dim:#92a083;
    --green:#033500; --green-d:#0a4d05; --yellow:#ffe314; --yellow-d:#d6bd00;
    --issuer:#033500; --issuer-l:#0a5e16; --brand:#1c5fa8; --brand-l:#15507f;
    --cust:#7a3fb0; --cust-l:#5e2e8c; --quorum:#9a8600; --quorum-l:#5c4f00;
    --ok:#1d7a32; --bad:#c0392b; --amber:#8a7100;
    --mono:"Plus Jakarta Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --sans:"Plus Jakarta Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;color:var(--text);font-family:var(--sans);font-size:14px;font-variant-numeric:tabular-nums;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    background:
      radial-gradient(1100px 520px at 82% -8%, rgba(255,227,20,.16), transparent 60%),
      radial-gradient(900px 520px at -8% 112%, rgba(3,53,0,.07), transparent 55%),
      var(--bg);
    background-attachment:fixed;}
  .wrap{max-width:1280px;margin:0 auto;padding:16px;animation:fadeIn .45s ease both;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#0a4d05,#033500);color:var(--yellow);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:21px;box-shadow:0 5px 14px rgba(3,53,0,.28);flex:0 0 auto;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px;flex-wrap:wrap;border-bottom:3px solid var(--yellow);padding-bottom:12px;}
  .topbar h1{font-size:20px;font-weight:700;margin:0;color:var(--green);letter-spacing:-.3px;}
  .topbar .sub{font-size:12px;color:var(--muted);}
  .pills{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .pill{font-family:var(--mono);font-size:11px;padding:4px 9px;border-radius:6px;border:1px solid var(--border);color:var(--muted);background:var(--panel);}
  .pill.tok{color:var(--green);border-color:#bcd7a8;background:#eef6e3;}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;box-shadow:0 1px 3px rgba(3,53,0,.06),0 10px 26px rgba(3,53,0,.035);transition:box-shadow .18s ease;}
  .panel h2{font-size:12px;font-weight:600;margin:0 0 10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;}
  button{font-family:var(--sans);font-size:13px;font-weight:500;border-radius:8px;padding:7px 12px;cursor:pointer;border:1px solid var(--border);background:var(--panel);color:var(--text);transition:transform .12s ease,box-shadow .15s ease,background .15s ease,border-color .15s ease;}
  button:hover{border-color:var(--green);box-shadow:0 2px 10px rgba(3,53,0,.10);}
  button:active{transform:scale(.97);}
  button:disabled{opacity:.5;cursor:not-allowed;box-shadow:none;}
  button.run{background:linear-gradient(180deg,#0a4d05,#033500);border-color:#033500;color:var(--yellow);font-weight:600;letter-spacing:.2px;box-shadow:0 4px 12px rgba(3,53,0,.20);}
  button.run:hover{transform:translateY(-1px);background:linear-gradient(180deg,#0c5a06,#06440a);box-shadow:0 7px 18px rgba(3,53,0,.28);}
  button.ghost{background:transparent;}
  input,select{background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 8px;font-size:12px;font-family:var(--mono);width:100%;}
  input:focus,select:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 2px rgba(255,227,20,.45);}
  /* stage rail */
  .rail{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px;}
  @media(max-width:1000px){.rail{grid-template-columns:repeat(2,1fr);} }
  .stage{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:8px;box-shadow:0 1px 3px rgba(3,53,0,.06);transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease;}
  .stage:hover{transform:translateY(-3px);box-shadow:0 12px 26px rgba(3,53,0,.12);border-color:#c2ccae;}
  .stage > button{margin-top:auto;}
  .stage.done{border-color:var(--green);box-shadow:0 0 0 1px var(--green),0 8px 20px rgba(3,53,0,.10);}
  .stage .sh{display:flex;align-items:center;gap:8px;}
  .stage .num{width:22px;height:22px;border-radius:50%;background:var(--panel2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-family:var(--mono);color:var(--muted);}
  .stage.done .num{background:var(--green);color:var(--yellow);border-color:var(--green);}
  .stage .nm{font-size:13px;font-weight:600;}
  .stage .ds{font-size:11px;color:var(--dim);line-height:1.4;min-height:30px;}
  .stage .params{display:flex;gap:6px;flex-wrap:wrap;}
  .stage .params input{width:64px;}
  .layout{display:grid;grid-template-columns:1fr 360px;gap:14px;align-items:start;}
  @media(max-width:1050px){.layout{grid-template-columns:1fr;} }
  .side{display:flex;flex-direction:column;gap:14px;}
  table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px;}
  th{text-align:left;color:var(--muted);font-weight:500;padding:5px 6px;border-bottom:1px solid var(--border);font-size:10.5px;}
  td{padding:5px 6px;border-bottom:1px solid #ebeee0;}
  tr:last-child td{border-bottom:none;}
  .tag{font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:5px;}
  .tag.issuer{color:var(--issuer-l);background:#e3efd9;}
  .tag.brand{color:var(--brand-l);background:#e2edfa;}
  .tag.customer{color:var(--cust-l);background:#f1e7f9;}
  .feed{max-height:260px;overflow:auto;font-family:var(--mono);font-size:11.5px;}
  .feed .item{display:flex;justify-content:space-between;gap:6px;padding:6px 3px;border-bottom:1px solid #ebeee0;}
  .feed .ok{color:var(--ok);} .feed .bad{color:var(--bad);}
  .st1{color:var(--issuer-l);} .st2{color:var(--brand-l);} .st3{color:var(--cust-l);} .st4{color:var(--amber);} .st5{color:#b3306f;}
  .hint{font-size:11px;color:var(--dim);}
  .toast{margin-top:8px;font-size:12px;font-family:var(--mono);padding:8px 10px;border-radius:7px;}
  .toast.ok{background:#e7f4e3;color:var(--ok);} .toast.bad{background:#fbe7e4;color:var(--bad);}
  .setrow{display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;padding:5px 4px;border-bottom:1px solid #ebeee0;}
  .pos{color:var(--ok);} .neg{color:var(--bad);}
  svg text{font-family:var(--mono);}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-top:6px;}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle;}
  details summary{cursor:pointer;color:var(--muted);font-size:12px;}
  .fields{display:flex;gap:8px;flex-wrap:wrap;}
  .field{display:flex;flex-direction:column;gap:3px;}
  .flabel{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--text);}
  .info{position:relative;display:inline-flex;cursor:help;}
  .info .ic{width:13px;height:13px;border-radius:50%;border:1px solid var(--dim);color:var(--dim);font-size:9px;line-height:1;display:flex;align-items:center;justify-content:center;font-family:var(--mono);}
  .info:hover .ic{border-color:var(--green);color:var(--green);}
  .info .tip{position:absolute;bottom:135%;left:50%;transform:translateX(-50%);background:var(--green);border:1px solid var(--green);color:#fff;padding:7px 9px;border-radius:7px;width:185px;font-size:11px;line-height:1.45;font-family:var(--sans);z-index:20;display:none;box-shadow:0 6px 16px rgba(3,53,0,.25);}
  .info .tip::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--green);}
  .info:hover .tip{display:block;}
  .settle-line{animation:march 1.1s linear infinite;}
  @keyframes march{to{stroke-dashoffset:-18;}}
  .qpulse{transform-box:fill-box;transform-origin:center;animation:qp 2.3s ease-out infinite;}
  @keyframes qp{0%{transform:scale(1);opacity:.55;}80%,100%{transform:scale(2.3);opacity:0;}}
  .gnode{transition:transform .15s ease;}
  svg a{cursor:pointer;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

async function api(path, opts){ const r = await fetch(path, opts); return r.json(); }
const post = (path, body) => api(path, {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(body||{})});
const trunc = (s,n)=> (s && s.length>n) ? s.slice(0,n-1)+"…" : s;
const EXPLORER = "https://testnetexplorer.rubix.net/transaction-explorer?tx=";

// ── graph geometry ────────────────────────────────────────────────────────────
const VB = { w: 1000, h: 600 };
const ISSUER = { x: 70, y: 300 };
const BRAND_POS = { brand1:{x:450,y:80}, brand2:{x:450,y:190}, brand3:{x:450,y:300}, brand4:{x:450,y:410}, brand5:{x:450,y:520} };
const QUORUM = { node7:{x:380,y:34}, node8:{x:520,y:34} };
const WALLET = { node9:{x:850,y:190}, node10:{x:850,y:450} };

function customerPositions(customers){
  const groups = { node9:[], node10:[] };
  customers.forEach(c => { (groups[c.node] || (groups[c.node]=[])).push(c); });
  const pos = {};
  for (const [node, list] of Object.entries(groups)){
    const anchor = WALLET[node] || {x:790,y:250};
    const n = list.length;
    list.forEach((c, i) => {
      const spread = Math.min(40, 200/Math.max(n,1));
      const y = anchor.y + (i - (n-1)/2) * spread;
      const x = anchor.x + (i % 2 === 0 ? 0 : 48);
      pos[c.id] = { x, y };
    });
  }
  return pos;
}

function Info({ text }){
  return (<span className="info"><span className="ic">i</span><span className="tip">{text}</span></span>);
}

function AliasRow({ id, type, name, onSet }){
  const [v,setV] = useState(name);
  useEffect(()=>{ setV(name); },[name]);
  return (
    <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:5}}>
      <span style={{width:58,fontSize:10,color:"var(--muted)",fontFamily:"var(--mono)"}}>{id}</span>
      <input value={v} onChange={e=>setV(e.target.value)}
        onBlur={()=>{ if(v!==name) onSet(type,id,v); }}
        onKeyDown={e=>{ if(e.key==="Enter") e.target.blur(); }} />
    </div>
  );
}
function AliasEditor({ issuer, brands, customers, onSet }){
  return (
    <details className="panel">
      <summary>Rename issuer, brands &amp; customers</summary>
      <div style={{marginTop:10}}>
        <div className="hint" style={{marginBottom:6}}>Issuer</div>
        <AliasRow id="issuer" type="issuer" name={(issuer&&issuer.alias)||"Issuer"} onSet={onSet}/>
        <div className="hint" style={{margin:"10px 0 6px"}}>Brands</div>
        {brands.map(b=> <AliasRow key={b.id} id={b.id} type="brand" name={b.alias||b.label} onSet={onSet}/>)}
        {customers.length>0 && <div className="hint" style={{margin:"10px 0 6px"}}>Customers</div>}
        {customers.map(c=> <AliasRow key={c.id} id={c.id} type="customer" name={c.alias||c.label} onSet={onSet}/>)}
      </div>
    </details>
  );
}
function Field({ label, info, width, children }){
  return (<div className="field"><div className="flabel">{label}<Info text={info}/></div>{React.cloneElement(children, { style: { width: width||72, ...(children.props.style||{}) } })}</div>);
}

function StageRail({ status, busy, onRun, params, setParams }){
  const stages = [
    { n:1, nm:"Issue", ds:"Mint the single loyalty token on node1 (the issuer).",
      ctrl:(<div className="fields">
        <Field label="Token" width={88} info="Name of the loyalty token to mint. Every brand shares this one token (e.g. LOYALTY).">
          <input value={params.tokenName} onChange={e=>setParams({...params,tokenName:e.target.value})}/>
        </Field>
        <Field label="Count" info="How many loyalty points to mint in this batch on the issuer (node1).">
          <input value={params.count} onChange={e=>setParams({...params,count:e.target.value})}/>
        </Field>
        <Field label="Start idx" info="Starting on-chain index for this batch. Leave blank to auto-continue from the last mint; set it only to skip past tokens already minted on-chain.">
          <input value={params.startIndex} placeholder="auto" onChange={e=>setParams({...params,startIndex:e.target.value})}/>
        </Field>
      </div>) },
    { n:2, nm:"Distribute", ds:"Issuer sends the token evenly to the 5 brand DIDs (node2–6)." },
    { n:3, nm:"Earn", ds:"Create customers on node9/10; each earns ≤5 pts from 1–3 brands.",
      ctrl:(<div className="fields">
        <Field label="Customers" width={70} info="How many customer DIDs to create, split across the node9 and node10 wallets.">
          <input value={params.numCustomers} onChange={e=>setParams({...params,numCustomers:e.target.value})}/>
        </Field>
        <Field label="Seed" info="Random seed for the awards & redemptions. Reusing the same seed reproduces the exact same demo run.">
          <input value={params.seed} onChange={e=>setParams({...params,seed:e.target.value})}/>
        </Field>
      </div>) },
    { n:4, nm:"Redeem", ds:"Customers send points to brands — cross-brand allowed." },
    { n:5, nm:"Settle", ds:"Provenance netting: earning-brand pays the brand that honoured it." },
  ];
  return (
    <div className="rail">
      {stages.map(s=>(
        <div key={s.n} className={"stage"+(status[s.n]?" done":"")}>
          <div className="sh"><div className="num">{status[s.n]?"✓":s.n}</div><div className="nm">{s.nm}</div></div>
          <div className="ds">{s.ds}</div>
          {s.ctrl}
          <button className="run" disabled={busy} onClick={()=>onRun(s.n)}>{busy===s.n?"Running…":"Run stage "+s.n}</button>
        </div>
      ))}
    </div>
  );
}

const SVGNS = "http://www.w3.org/2000/svg";
function txColor(stage){
  if(!stage) return "#1c5fa8";
  if(stage.startsWith("stage2")) return "#0a5e16";
  if(stage.startsWith("stage3")) return "#7a3fb0";
  if(stage.startsWith("stage4")) return "#b58a00";
  if(stage.startsWith("stage5")) return "#b3306f";
  return "#1c5fa8";
}

function Graph({ holdings, settlements, inflight, ledger, disp }){
  const layer = useRef(null);
  const dots = useRef(new Map());   // aid -> { el, from, to, mode, progress }
  const raf = useRef(null);
  const lastTs = useRef(0);
  const nodePosRef = useRef(null);
  const brands = holdings.brands || [];
  const customers = holdings.customers || [];
  const custPos = customerPositions(customers);
  const nodePos = (id) => {
    if (id === "node1" || id === (holdings.issuerName||"node1") || id === "issuer") return ISSUER;
    if (BRAND_POS[id]) return BRAND_POS[id];
    if (custPos[id]) return custPos[id];
    return null;
  };
  nodePosRef.current = nodePos;

  // frame loop: each dot creeps toward its target while the tx is pending, then
  // rushes the rest of the way once the tx succeeds
  function frame(now){
    const dt = Math.min(0.05, (now - lastTs.current) / 1000 || 0);
    lastTs.current = now;
    for (const [aid, d] of dots.current){
      const finishing = d.mode === "finishing";
      const speed = finishing ? 3.4 : 0.42;   // progress units / sec
      const cap = finishing ? 1 : 0.82;        // pending dots hold near 82%
      d.progress = Math.min(cap, d.progress + speed * dt);
      d.el.setAttribute("cx", d.from.x + (d.to.x - d.from.x) * d.progress);
      d.el.setAttribute("cy", d.from.y + (d.to.y - d.from.y) * d.progress);
      if (finishing && d.progress >= 1){ d.el.remove(); dots.current.delete(aid); }
    }
    raf.current = dots.current.size > 0 ? requestAnimationFrame(frame) : null;
  }
  function startRaf(){ if(!raf.current){ lastTs.current = performance.now(); raf.current = requestAnimationFrame(frame); } }

  // start a dot for the current in-flight transfer; finish/remove dots once their
  // tx shows up in the ledger as success/fail
  useEffect(()=>{
    if (inflight && inflight.aid != null && !dots.current.has(inflight.aid) && layer.current){
      const a = nodePosRef.current(inflight.from), b = nodePosRef.current(inflight.to);
      if (a && b){
        const el = document.createElementNS(SVGNS, "circle");
        el.setAttribute("r","6"); el.setAttribute("fill", txColor(inflight.stage));
        el.setAttribute("filter","url(#nodeShadow)");
        el.setAttribute("cx", a.x); el.setAttribute("cy", a.y);
        layer.current.appendChild(el);
        dots.current.set(inflight.aid, { el, from:a, to:b, mode:"pending", progress:0 });
        startRaf();
      }
    }
    const byAid = {};
    (ledger||[]).forEach(e=>{ if(e.aid != null) byAid[e.aid] = e; });
    for (const [aid, d] of dots.current){
      const e = byAid[aid];
      if (!e) continue;
      if (e.status && d.mode !== "finishing"){ d.mode = "finishing"; startRaf(); }
      else if (!e.status){ d.el.remove(); dots.current.delete(aid); } // failed
    }
  },[inflight, ledger]); // eslint-disable-line

  return (
    <svg viewBox={`0 0 ${VB.w} ${VB.h}`} width="100%" style={{display:"block"}}>
      <defs>
        <filter id="nodeShadow" x="-40%" y="-40%" width="180%" height="180%">
          <feDropShadow dx="0" dy="2.5" stdDeviation="3.5" floodColor="#033500" floodOpacity="0.20"/>
        </filter>
        <linearGradient id="gIssuer" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor="#eef7e6"/><stop offset="1" stopColor="#d8ebca"/></linearGradient>
        <linearGradient id="gBrand" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor="#edf4fd"/><stop offset="1" stopColor="#dbe8f8"/></linearGradient>
        <linearGradient id="gCust" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor="#f7eefc"/><stop offset="1" stopColor="#ecdef6"/></linearGradient>
        <radialGradient id="gQuorum" cx="0.5" cy="0.4" r="0.7"><stop offset="0" stopColor="#fff8c8"/><stop offset="1" stopColor="#ffe98c"/></radialGradient>
      </defs>
      {/* quorum strip */}
      {Object.entries(QUORUM).map(([n,p])=>(
        <g key={n}>
          <circle cx={p.x} cy={p.y} r={13} fill="none" stroke="#ffe314" strokeWidth="2" className="qpulse"/>
          <circle cx={p.x} cy={p.y} r={13} fill="url(#gQuorum)" stroke="#9a8600" filter="url(#nodeShadow)"/>
          <text x={p.x} y={p.y+4} textAnchor="middle" fill="#5c4f00" fontSize="9" fontWeight="500">{n==="node7"?"Q7":"Q8"}</text>
        </g>
      ))}
      <text x={430} y={12} textAnchor="middle" fill="#5d6b50" fontSize="10">quorum validators</text>

      {/* issuer -> brand edges */}
      {brands.map(b=>(
        <line key={"e"+b.id} x1={ISSUER.x} y1={ISSUER.y} x2={BRAND_POS[b.id].x} y2={BRAND_POS[b.id].y} stroke="#c4d2b6" strokeWidth="1.2"/>
      ))}
      {/* earned edges brand -> customer */}
      {customers.map(c => Object.keys(c.earned||{}).map(bid=>{
        const a = BRAND_POS[bid], p = custPos[c.id];
        if(!a||!p) return null;
        return <line key={c.id+bid} x1={a.x} y1={a.y} x2={p.x} y2={p.y} stroke="#e0d3ee" strokeWidth="1"/>;
      }))}
      {/* settlement edges brand -> brand: alternate arcs left / right so the
          collinear column edges (and their amount labels) fan apart */}
      {(settlements||[]).map((s,i)=>{
        const a = BRAND_POS[s.from], b = BRAND_POS[s.to];
        if(!a||!b) return null;
        const span = Math.abs(a.y - b.y);
        const dir = (i % 2 === 0) ? -1 : 1;          // even -> left, odd -> right
        const bow = (40 + span * 0.20) * dir;         // longer spans curve out more
        const cx = a.x + bow, cy = (a.y + b.y) / 2;
        const lx = a.x + bow / 2, ly = cy;            // label at the arc apex
        const w = 12 + String(s.amount).length * 7;
        return (<g key={"s"+i}>
          <path d={`M ${a.x} ${a.y} Q ${cx} ${cy} ${b.x} ${b.y}`} fill="none"
            stroke="#c0398a" strokeWidth="1.6" strokeDasharray="5 4" className="settle-line" opacity="0.85"/>
          <rect x={lx - w/2} y={ly - 9} width={w} height={18} rx={5} fill="#fbfcf6" stroke="#f0cfe0"/>
          <text x={lx} y={ly + 4} textAnchor="middle" fill="#b3306f" fontSize="11" fontWeight="600">{s.amount}</text>
        </g>);
      })}

      <g ref={layer}></g>

      {/* issuer */}
      <circle cx={ISSUER.x} cy={ISSUER.y} r={34} fill="url(#gIssuer)" stroke="#033500" strokeWidth="2" filter="url(#nodeShadow)"/>
      <text x={ISSUER.x} y={ISSUER.y-2} textAnchor="middle" fill="#033500" fontSize="11" fontWeight="500">{trunc(disp(holdings.issuerName||"node1"),12)}</text>
      <text x={ISSUER.x} y={ISSUER.y+12} textAnchor="middle" fill="#0a4d05" fontSize="11">{holdings.issuer ?? 0}</text>

      {/* brands */}
      {brands.map(b=>(
        <g key={b.id}>
          <circle cx={BRAND_POS[b.id].x} cy={BRAND_POS[b.id].y} r={27} fill="url(#gBrand)" stroke="#1c5fa8" strokeWidth="2" filter="url(#nodeShadow)"/>
          <text x={BRAND_POS[b.id].x} y={BRAND_POS[b.id].y-3} textAnchor="middle" fill="#15507f" fontSize="10" fontWeight="500">{trunc(disp(b.id),11)}</text>
          <text x={BRAND_POS[b.id].x} y={BRAND_POS[b.id].y+11} textAnchor="middle" fill="#15507f" fontSize="11">{b.balance}</text>
        </g>
      ))}

      {/* wallet anchors */}
      {Object.entries(WALLET).map(([n,p])=>(
        <text key={n} x={p.x+12} y={p.y - 95} textAnchor="middle" fill="#5d6b50" fontSize="10">{n} wallet</text>
      ))}

      {/* customers */}
      {customers.map(c=>{
        const p = custPos[c.id]; if(!p) return null;
        return (<g key={c.id}>
          <circle cx={p.x} cy={p.y} r={15} fill="url(#gCust)" stroke="#7a3fb0" strokeWidth="1.5" filter="url(#nodeShadow)"/>
          <text x={p.x} y={p.y+4} textAnchor="middle" fill="#5e2e8c" fontSize="9">{c.balance}</text>
          <text x={p.x+18} y={p.y+4} fill="#6b5a7e" fontSize="8.5">{trunc(disp(c.id),10)}</text>
        </g>);
      })}
    </svg>
  );
}

function App(){
  const [state,setState] = useState({stageStatus:{},token:{}});
  const [holdings,setHoldings] = useState({brands:[],customers:[],issuer:0});
  const [ledger,setLedger] = useState([]);
  const [settle,setSettle] = useState({report:[],settlements:[]});
  const [busy,setBusy] = useState(0);
  const [toast,setToast] = useState(null);
  const [inflight,setInflight] = useState(null);
  const [params,setParams] = useState({tokenName:"LOYALTY",count:1000,startIndex:"",numCustomers:8,seed:42});
  const [filter,setFilter] = useState("all");
  const busyRef = useRef(0);
  const stateRef = useRef(null);

  // full data pull (also clears any stale in-flight marker)
  const pullAll = useCallback(async ()=>{
    const [s,h,l,se] = await Promise.all([
      api("/api/state"), api("/api/holdings"), api("/api/ledger"), api("/api/settlement")
    ]);
    stateRef.current = s;
    setState(s); setHoldings({...h, issuerName:s?.issuer?.name});
    setLedger(l.ledger||[]); setInflight(l.inflight||null);
    setSettle(se.report||{report:[],settlements:[]});
  },[]);

  // idle background refresh (paused while a stage runs so it can't race the fast poller)
  useEffect(()=>{
    pullAll();
    const t = setInterval(()=>{ if(!busyRef.current) pullAll(); }, 6000);
    return ()=>clearInterval(t);
  },[pullAll]);

  function flash(ok,msg){ setToast({ok,msg}); setTimeout(()=>setToast(null),6000); }

  async function runStage(n){
    setBusy(n); busyRef.current = n;
    // while the stage API is running, fast-poll the ledger + in-flight transfer so
    // the graph can start a dot when a transfer begins and finish it on success
    const fast = setInterval(async ()=>{
      try{
        const [l,h] = await Promise.all([api("/api/ledger"), api("/api/holdings")]);
        setLedger(l.ledger||[]);
        setInflight(l.inflight||null);
        setHoldings({...h, issuerName: stateRef.current?.issuer?.name || "node1"});
      }catch(e){}
    }, 350);
    try{
      const body = n===1 ? {tokenName:params.tokenName,count:Number(params.count), ...(params.startIndex!==""?{startIndex:Number(params.startIndex)}:{})}
        : n===3 ? {numCustomers:Number(params.numCustomers),maxPerAward:5,seed:Number(params.seed)}
        : n===4 ? {seed:Number(params.seed)} : {};
      const r = await post("/api/stage/"+n, body);
      flash(r.status, r.status ? "Stage "+n+" complete" : "Stage "+n+": "+r.message);
    }catch(e){ flash(false, e.message); }
    finally{
      clearInterval(fast);
      busyRef.current = 0; setBusy(0);
      await pullAll(); // final sync once the stage has finished
    }
  }
  async function reset(){
    if(!confirm("Reset the demo story? (on-chain tokens persist; mint cursor preserved)")) return;
    setBusy(-1); busyRef.current = -1;
    const r = await post("/api/reset");
    flash(r.status, r.message);
    busyRef.current = 0; setBusy(0); setInflight(null);
    await pullAll();
  }

  const status = state.stageStatus || {};
  const filtered = filter==="all" ? ledger : ledger.filter(e=>e.stage && e.stage.startsWith("stage"+filter));
  const totalCust = (holdings.customers||[]).length;
  const settleReport = settle.report || [];
  const settlements = settle.settlements || [];

  // display-name map: id -> alias or default label (used everywhere)
  const nameMap = {};
  if(state.issuer?.name) nameMap[state.issuer.name] = state.issuer.alias || "Issuer";
  (state.brands||[]).forEach(b=> nameMap[b.id] = b.alias || b.label);
  (state.customers||[]).forEach(c=> nameMap[c.id] = c.alias || c.label);
  const disp = (id)=> nameMap[id] || id;

  async function setAlias(type, id, alias){
    await post("/api/alias", { type, id, alias });
    await pullAll(false);
  }

  return (
    <div className="wrap">
      <div className="topbar">
        <div style={{display:"flex",alignItems:"center",gap:13}}>
          <div className="logo">R</div>
          <div>
            <h1>Rubix Network Coin Platform</h1>
            <div className="sub">Multi-brand loyalty &amp; redemption</div>
          </div>
        </div>
        <div className="pills">
          <span className="pill tok">token <b style={{fontWeight:700,letterSpacing:".2px"}}>{state.token?.name||"—"}</b></span>
          <span className="pill">brands 5</span>
          <span className="pill">customers {totalCust}</span>
          <button className="ghost" disabled={busy!==0} onClick={reset}>Reset demo</button>
        </div>
      </div>

      <StageRail status={status} busy={busy} onRun={runStage} params={params} setParams={setParams} />
      {toast && <div className={"toast "+(toast.ok?"ok":"bad")}>{toast.msg}</div>}

      <div className="layout" style={{marginTop:14}}>
        <div className="panel" style={{background:"#fbfcf6"}}>
          <Graph holdings={holdings} settlements={settlements} inflight={inflight} ledger={ledger} disp={disp} />
          <div className="legend">
            <span><span className="dot" style={{background:"#033500"}}></span>issuer</span>
            <span><span className="dot" style={{background:"#1c5fa8"}}></span>brand</span>
            <span><span className="dot" style={{background:"#7a3fb0"}}></span>customer</span>
            <span><span className="dot" style={{background:"#9a8600"}}></span>quorum</span>
            <span><span className="dot" style={{background:"#c0398a"}}></span>settlement</span>
          </div>
        </div>

        <div className="side">
          <AliasEditor issuer={state.issuer} brands={state.brands||[]} customers={state.customers||[]} onSet={setAlias} />
          <div className="panel">
            <h2>Settlement {status[5]?"result":"plan"}</h2>
            {settleReport.length===0 || settleReport.every(r=>(r.float||0)===0)
              ? <div className="hint">Runs after Redeem. Each brand returns the points it holds to the brand they were earned from; everyone nets back toward their float (~{state.token?.name?"200":"float"}).</div>
              : (<div>
                  {settleReport.map(r=>(
                    <div className="setrow" key={r.brand}>
                      <span>{disp(r.brand)}</span>
                      <span className="hint">{r.balance} → {r.result}</span>
                      <span className={r.net===0?"":(r.net>0?"pos":"neg")}>{r.net>0?"+":""}{r.net}</span>
                    </div>
                  ))}
                  <div className="hint" style={{marginTop:8}}>{settlements.length} settlement transfer(s){status[5]?" applied":""}</div>
                </div>)}
          </div>

          <div className="panel">
            <h2>Holdings</h2>
            <table>
              <thead><tr><th>entity</th><th>type</th><th>bal</th><th>earned</th><th>redeemed</th></tr></thead>
              <tbody>
                <tr><td>{disp(state.issuer?.name)}</td><td><span className="tag issuer">issuer</span></td><td>{holdings.issuer??0}</td><td></td><td></td></tr>
                {(holdings.brands||[]).map(b=>(
                  <tr key={b.id}><td>{disp(b.id)}</td><td><span className="tag brand">brand</span></td><td>{b.balance}</td><td></td><td></td></tr>
                ))}
                {(holdings.customers||[]).map(c=>(
                  <tr key={c.id}><td>{disp(c.id)}</td><td><span className="tag customer">{c.node}</span></td><td>{c.balance}</td><td>{c.earnedTotal}</td><td>{c.redeemedTotal}</td></tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div className="panel" style={{marginTop:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <h2 style={{margin:0}}>Transaction ledger</h2>
          <div style={{display:"flex",gap:6}}>
            {["all","1","2","3","4","5"].map(f=>(
              <button key={f} className="ghost" style={{padding:"3px 8px",fontSize:12,borderColor:filter===f?"var(--green)":"var(--border)",color:filter===f?"var(--green)":"var(--text)"}} onClick={()=>setFilter(f)}>{f==="all"?"all":"stage "+f}</button>
            ))}
          </div>
        </div>
        <div className="feed">
          {filtered.length===0 && <div className="hint">No transactions yet.</div>}
          {filtered.slice().reverse().map(e=>{
            const sc = e.stage?.startsWith("stage1")?"st1":e.stage?.startsWith("stage2")?"st2":e.stage?.startsWith("stage3")?"st3":e.stage?.startsWith("stage4")?"st4":"st5";
            return (
              <div className="item" key={e.seq}>
                <span className={e.status?"ok":"bad"}>{e.status?"OK":"FAIL"}</span>
                <span className={sc} style={{flex:1,margin:"0 8px"}}>{(e.stage||"").replace("stage","s").replace("-"," ")} · {disp(e.from)} → {disp(e.to)} · {e.amount} {state.token?.name}</span>
                {e.txId
                  ? <a href={EXPLORER+e.txId} target="_blank" rel="noopener noreferrer" title="View on Rubix testnet explorer" style={{color:"#1c5fa8",textDecoration:"none"}}>{e.txId.slice(0,8)+"…"}</a>
                  : <span style={{color:"#5b626d"}}></span>}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
