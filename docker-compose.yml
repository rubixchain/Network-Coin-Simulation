# Network Coin Simulation — full stack in one command.
#
#   docker compose up -d --build      # 10 rubix nodes + 10 postgres + demo UI
#   open http://localhost:4000
#
# The node image downloads the official rubixgoplatform v1.0.0 release binary
# (override with RUBIX_VERSION / RUBIX_NODE_IMAGE in .env) — no Go source needed.
# node1 carries the build; nodes 2-10 reuse the same image tag.

x-node-health: &nodeHealth
  test: ["CMD", "bash", "-c", "</dev/tcp/localhost/20000"]
  interval: 10s
  timeout: 5s
  retries: 30
  start_period: 30s

x-pg-health: &pgHealth
  test: ["CMD-SHELL", "pg_isready -U rubix"]
  interval: 5s
  timeout: 3s
  retries: 5

networks:
  ncs-net:
    driver: bridge

services:

  # ─── node1 (FT issuer) — builds the shared node image ─────────────────────
  node1-postgres:
    image: postgres:16
    container_name: ncs-node1-postgres
    environment: { POSTGRES_USER: rubix, POSTGRES_PASSWORD: rubixpass, POSTGRES_DB: rubix_1 }
    volumes: ["./data/node1/db:/var/lib/postgresql/data"]
    networks: [ncs-net]
    healthcheck: *pgHealth
    ports: ["5433:5432"]
  node1:
    build:
      context: ./docker/node
      args: { RUBIX_VERSION: "${RUBIX_VERSION:-v1.0.0}" }
    image: ${RUBIX_NODE_IMAGE:-network-coin/rubix-node:v1.0.0}
    container_name: ncs-node1
    depends_on: { node1-postgres: { condition: service_healthy } }
    environment:
      NETWORK_MODE: ${NETWORK_MODE:-testnet}
      DB_HOST: node1-postgres
      DB_PORT: 5432
      DB_NAME: rubix_1
      RUBIX_EXTERNAL_IP: ${EXTERNAL_IP:-}
      RUBIX_EXTERNAL_SWARM_PORT: "4001"
    ports: ["20000:20000", "4001:4002"]
    volumes: ["./data/node1/app:/app/data", "./swarm:/swarm"]
    networks: [ncs-net]
    healthcheck: *nodeHealth

  # ─── node2 (brand) ────────────────────────────────────────────────────────
  node2-postgres:
    image: postgres:16
    container_name: ncs-node2-postgres
    environment: { POSTGRES_USER: rubix, POSTGRES_PASSWORD: rubixpass, POSTGRES_DB: rubix_2 }
    volumes: ["./data/node2/db:/var/lib/postgresql/data"]
    networks: [ncs-net]
    healthcheck: *pgHealth
    ports: ["5434:5432"]
  node2:
    image: ${RUBIX_NODE_IMAGE:-network-coin/rubix-node:v1.0.0}
    container_name: ncs-node2
    depends_on: { node2-postgres: { condition: service_healthy }, node1: { condition: service_started } }
    environment:
      NETWORK_MODE: ${NETWORK_MODE:-testnet}
      DB_HOST: node2-postgres
